name: muslingo
description: Muslingo — игровое изучение Корана, арабского языка и основ ислама.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.2
  go_router: ^14.2.7
  lottie: ^3.1.2
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  flutter_animate: ^4.5.0
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  http: ^1.2.2
  connectivity_plus: ^6.0.5
  path_provider: ^2.1.4
  flutter_local_notifications: ^18.0.1
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.2
  pocketbase: ^0.24.0
  flutter_tts: ^4.2.5
  speech_to_text: ^7.4.0
  just_audio: ^0.10.6
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/data/

  fonts:
    - family: Nunito
      fonts:
        - asset: fonts/Nunito-Variable.ttf
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
